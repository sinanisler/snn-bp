name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    if: contains(github.event.head_commit.message, 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from commit date
        id: version
        run: echo "tag=v$(date +'%Y.%m.%d.%H%M')" >> $GITHUB_OUTPUT

      - name: Download snn-brx-child-theme
        run: curl -L https://github.com/sinanisler/snn-brx-child-theme/releases/latest/download/snn-brx-child-theme.zip -o snn-brx-child-theme.zip

      - name: Build release zip
        run: zip snn-bp-release.zip blueprint.json bricks.zip snn-brx-child-theme.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: ${{ github.event.head_commit.message }}
          files: snn-bp-release.zip
